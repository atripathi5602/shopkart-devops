jobs:

- job: DeployBackend
  displayName: Deploy Backend Container

  pool:
    vmImage: ubuntu-latest

  steps:

  - task: AzureCLI@2
    displayName: Deploy Backend on VM

    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript

      inlineScript: |

        az vm run-command invoke \
          --resource-group $(RESOURCE_GROUP) \
          --name $(BACKEND_VM_NAME) \
          --command-id RunShellScript \
          --scripts '
            docker login $(ACR_NAME).azurecr.io -u $(ACR_USERNAME) -p $(ACR_PASSWORD)

            docker pull $(ACR_NAME).azurecr.io/$(BACKEND_IMAGE_NAME):v1

            docker stop backend || true
            docker rm backend || true

            docker run -d \
              --name backend \
              -p 8080:8080 \
              --restart always \
              $(ACR_NAME).azurecr.io/$(BACKEND_IMAGE_NAME):v1
          '