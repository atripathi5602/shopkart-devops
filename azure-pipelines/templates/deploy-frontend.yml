jobs:
  - job: DeployFrontend
    displayName: Deploy Frontend Container

    pool:
      vmImage: ubuntu-latest

    steps:
      - task: AzureCLI@2
        displayName: Deploy Frontend on VM

        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript

          inlineScript: |

            az vm run-command invoke \
              --resource-group $(RESOURCE_GROUP) \
              --name $(FRONTEND_VM_NAME) \
              --command-id RunShellScript \
              --scripts '
                docker login $(ACR_NAME).azurecr.io -u $(ACR_USERNAME) -p $(ACR_PASSWORD)

                docker pull $(ACR_NAME).azurecr.io/$(FRONTEND_IMAGE_NAME):v1

                docker stop frontend || true
                docker rm frontend || true

                docker run -d \
                  --name frontend \
                  -p 80:80 \
                  --restart always \
                  $(ACR_NAME).azurecr.io/$(FRONTEND_IMAGE_NAME):v1
              '
